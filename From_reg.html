<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มลงทะเบียนขอรับยาไปรษณีย์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: 'K2D', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e8e8e8 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 20px 0;
            font-family: 'K2D', sans-serif;
        }
        .form-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .form-title {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
        }
        .form-label {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 40px;
            border-radius: 5px;
            transition: transform 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            color: white;
        }
        .btn-reset {
            background: #ccc;
            color: #333;
            font-weight: bold;
            padding: 10px 40px;
            border: none;
            border-radius: 5px;
        }
        .btn-reset:hover {
            background: #aaa;
            color: white;
        }
        .required {
            color: #dc3545;
        }
        .age-slider-container {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        .age-display {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
        .error-message {
            color: #dc3545;
            font-size: 14px;
            display: none;
        }
        .form-row {
            margin-bottom: 20px;
        }
        .input-group-text {
            background-color: #667eea;
            border-color: #667eea;
            color: white;
            border: none;
        }
        .input-group .form-control,
        .input-group .form-select {
            border-left: none;
        }
        .input-group .form-control:focus,
        .input-group .form-select:focus {
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-container">
                    <h2 class="form-title">💊 ฟอร์มลงทะเบียนขอรับยาไปรษณีย์</h2>
                    
                    <form id="medicineForm" onsubmit="validateForm(event)">
                        <!-- ชื่อ-สกุล -->
                        <div class="form-row">
                            <label for="fullname" class="form-label"><i class="fas fa-user"></i> ชื่อ-สกุล <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-pen"></i></span>
                                <input type="text" class="form-control" id="fullname" name="fullname" placeholder="กรุณากรอกชื่อและนามสกุล">
                            </div>
                            <div class="error-message" id="fullnameError">กรุณากรอกชื่อ-สกุล</div>
                        </div>

                        <!-- เพศ -->
                        <div class="form-row">
                            <label for="gender" class="form-label"><i class="fas fa-venus-mars"></i> เพศ <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-list"></i></span>
                                <select class="form-select" id="gender" name="gender">
                                    <option value="">-- กรุณาเลือกเพศ --</option>
                                    <option value="male">ชาย</option>
                                    <option value="female">หญิง</option>
                                    <option value="other">อื่นๆ</option>
                                </select>
                            </div>
                            <div class="error-message" id="genderError">กรุณาเลือกเพศ</div>
                        </div>

                        <!-- อายุ -->
                        <div class="form-row">
                            <label for="age" class="form-label"><i class="fas fa-birthday-cake"></i> อายุ <span class="required">*</span></label>
                            <div class="age-slider-container">
                                <input type="range" class="form-range" id="age" name="age" min="5" max="120" value="30" oninput="updateAgeDisplay()">
                                <div class="age-display" id="ageDisplay"><i class="fas fa-hourglass-half"></i> อายุ: 30 ปี</div>
                            </div>
                        </div>

                        <!-- ที่อยู่ -->
                        <div class="form-row">
                            <label for="address" class="form-label"><i class="fas fa-map-marker-alt"></i> ที่อยู่ <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-home"></i></span>
                                <textarea class="form-control" id="address" name="address" rows="1" placeholder="กรุณากรอกที่อยู่ (บ้านเลขที่ ซอย ถนน เขต จังหวัร โปรแกรม)"></textarea>
                            </div>
                            <div class="error-message" id="addressError">กรุณากรอกที่อยู่</div>
                        </div>

                        <!-- หมายเลขโทรศัพท์ -->
                        <div class="form-row">
                            <label for="phone" class="form-label"><i class="fas fa-phone"></i> หมายเลขโทรศัพท์ <span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-mobile-alt"></i></span>
                                <input type="tel" class="form-control" id="phone" name="phone" maxlength="10" placeholder="0X-XXXX-XXXX" pattern="[0-9]{10}">
                            </div>
                            <div class="error-message" id="phoneError">กรุณากรอกหมายเลขโทรศัพท์ให้ครบ 10 หลัก</div>
                        </div>

                        <!-- ประเภทผู้ป่วย -->
                        <div class="form-row">
                            <label class="form-label"><i class="fas fa-stethoscope"></i> ประเภทผู้ป่วย <span class="required">*</span></label>
                            <div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" id="patientOld" name="patientType" value="old">
                                    <label class="form-check-label" for="patientOld"><i class="fas fa-history"></i> ผู้ป่วยเก่า</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" id="patientNew" name="patientType" value="new">
                                    <label class="form-check-label" for="patientNew"><i class="fas fa-star"></i> ผู้ป่วยใหม่</label>
                                </div>
                            </div>
                            <div class="error-message" id="patientTypeError">กรุณาเลือกประเภทผู้ป่วย</div>
                        </div>

                        <!-- ปุ่มส่งและล้างข้อมูล -->
                        <div class="row mt-4">
                            <div class="col-6">
                                <button type="submit" class="btn btn-submit w-100">✓ ส่งแบบฟอร์ม</button>
                            </div>
                            <div class="col-6">
                                <button type="reset" class="btn btn-reset w-100" onclick="resetForm()">⟲ ล้างข้อมูล</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script>
        // อัปเดตการแสดงผลอายุ
        function updateAgeDisplay() {
            const ageInput = document.getElementById('age');
            const ageDisplay = document.getElementById('ageDisplay');
            ageDisplay.textContent = 'อายุ: ' + ageInput.value + ' ปี';
        }

        // ตรวจสอบการส่งฟอร์ม
        function validateForm(event) {
            event.preventDefault();
            
            // ล้างข้อความข้อผิดพลาดทั้งหมด
            clearErrors();
            
            let isValid = true;

            // ตรวจสอบชื่อ-สกุล
            const fullname = document.getElementById('fullname').value.trim();
            if (fullname === '') {
                showError('fullnameError');
                isValid = false;
            }

            // ตรวจสอบเพศ
            const gender = document.getElementById('gender').value;
            if (gender === '') {
                showError('genderError');
                isValid = false;
            }

            // ตรวจสอบที่อยู่
            const address = document.getElementById('address').value.trim();
            if (address === '') {
                showError('addressError');
                isValid = false;
            }

            // ตรวจสอบหมายเลขโทรศัพท์
            const phone = document.getElementById('phone').value.trim();
            if (phone === '' || phone.length !== 10 || isNaN(phone)) {
                showError('phoneError');
                isValid = false;
            }

            // ตรวจสอบประเภทผู้ป่วย
            const patientType = document.querySelector('input[name="patientType"]:checked');
            if (!patientType) {
                showError('patientTypeError');
                isValid = false;
            }

            // ถ้าข้อมูลถูกต้องทั้งหมด
            if (isValid) {
                alert('ลงทะเบียนสำเร็จ!\n\nชื่อ: ' + fullname + '\nเพศ: ' + gender + '\nอายุ: ' + document.getElementById('age').value + ' ปี\nเบอร์โทร: ' + phone + '\nประเภท: ' + (patientType.value === 'old' ? 'ผู้ป่วยเก่า' : 'ผู้ป่วยใหม่'));
                document.getElementById('medicineForm').reset();
                clearErrors();
                updateAgeDisplay();
            }
        }

        // แสดงข้อความข้อผิดพลาด
        function showError(elementId) {
            document.getElementById(elementId).style.display = 'block';
        }

        // ล้างข้อความข้อผิดพลาดทั้งหมด
        function clearErrors() {
            const errors = document.querySelectorAll('.error-message');
            errors.forEach(error => {
                error.style.display = 'none';
            });
        }

        // ล้างฟอร์ม
        function resetForm() {
            document.getElementById('medicineForm').reset();
            clearErrors();
            updateAgeDisplay();
        }
    </script>
</body>
</html>
